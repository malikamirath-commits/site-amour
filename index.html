<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour toi ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: black;
  color: #f5f5dc;
  overflow-x: hidden;
}

/* 🎬 Sections */
section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 40px 20px;
}

/* 🎬 Intro */
.hero {
  background: url('photo-intro.jpg') center/cover no-repeat;
  position: relative;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.text {
  position: relative;
  z-index: 2;
  max-width: 600px;
}

/* ✨ Images */
img {
  width: 90%;
  max-width: 320px;
  border-radius: 15px;
  margin-top: 20px;
  box-shadow: 0 0 20px rgba(255,215,0,0.3);
}

/* ✨ Fade + zoom */
.fade {
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  transition: 1.5s ease;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* ✍️ Texte progressif */
.typing {
  overflow: hidden;
  border-right: 2px solid gold;
  white-space: nowrap;
  animation: typing 6s steps(60, end), blink 1s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* 💛 Bouton */
button {
  padding: 12px 25px;
  background: transparent;
  border: 1px solid gold;
  color: gold;
  cursor: pointer;
  margin-top: 20px;
  border-radius: 30px;
  transition: 0.3s;
}

button:hover {
  background: gold;
  color: black;
}

/* ❤️ Coeurs animés */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<section class="hero">
  <div class="overlay"></div>
  <div class="text">
    <h1 class="typing">Certaines histoires méritent d’être racontées…</h1>
    <button onclick="startExperience()">Entrer</button>
  </div>
</section>

<!-- ❤️ TEXTE -->
<section>
  <div class="fade">
    <h2>Un message pour toi</h2>
    <p id="message"></p>
    <img src="photo-amour.jpg">
  </div>
</section>

<!-- 🌙 FIN -->
<section>
  <div class="fade">
    <h2>Pour toi, aujourd’hui et toujours</h2>
    <img src="photo-seul.jpg">
  </div>
</section>

<audio id="music" loop>
  <source src="musique.mp3" type="audio/mpeg">
</audio>

<script>
const text = `Pour commencer, je le ferai avec quelqu’un que tu aimes de tout ton cœur : ton papa, la personne qui t’a vu grandir et qui a participé à faire de toi l’homme que tu es aujourd’hui.

Et si je dois t’aimer, je dois aimer chaque partie de toi...

Je ne suis pas proche de toi actuellement, mais cette distance renforce mon amour pour toi.

Je suis désolée pour tout. Ne doute jamais de mon amour.

Je veux te rendre heureux.

Tu es un homme exceptionnel... mon homme.

Je t’aime dans cette vie et dans toutes les autres.

Joyeux anniversaire, l’homme de ma vie ❤️`;

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 30);
  }
}

/* 🎬 Start */
function startExperience() {
  const music = document.getElementById("music");

  if (music.paused) {
    music.play().catch(() => {});
  }

  window.scrollTo({
    top: window.innerHeight,
    behavior: 'smooth'
  });

  typeWriter();
}

/* ✨ Fade scroll */
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100) {
      el.classList.add('visible');
    }
  });
});

/* ❤️ Coeurs */
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 500);
</script>

</body>
      </html>
